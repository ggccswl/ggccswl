<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Gallery | GGCC Sahiwal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/theme.css">
</head>
<body class="bg-gray-50 text-gray-800 antialiased">
<div id="nav-root"></div>
<script src="nav.js"></script>

<main class="max-w-7xl mx-auto py-12 px-4">
    <h1 class="animate-on-scroll text-4xl font-black text-emerald-900 mb-2" data-animate>Media gallery</h1>
    <p class="animate-on-scroll text-gray-600 mb-2 max-w-2xl" data-animate>Photos are published only by college staff through the <a href="admin/" class="text-emerald-700 font-bold underline">admin panel</a> (Gallery → choose <strong>Academic / online</strong> or <strong>Campus events</strong>).</p>
    <p id="gallery-offline" class="hidden text-amber-800 text-sm bg-amber-50 border border-amber-200 rounded-xl px-4 py-3 mb-8">The gallery server is not reachable. Run <code class="bg-amber-100 px-1 rounded">npm start</code> in <code class="bg-amber-100 px-1 rounded">server/</code> to load photos.</p>

    <div class="mb-20">
        <div class="flex items-center space-x-4 mb-8">
            <h2 class="text-2xl font-black text-gray-800">Academic &amp; online</h2>
            <div class="flex-grow h-1 bg-emerald-200 rounded-full"></div>
        </div>
        <div id="onlineGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </div>

    <div>
        <div class="flex items-center space-x-4 mb-8">
            <h2 class="text-2xl font-black text-gray-800">Campus life</h2>
            <div class="flex-grow h-1 bg-emerald-200 rounded-full"></div>
        </div>
        <div id="eventsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </div>
</main>

<script>
(function () {
  var offline = document.getElementById('gallery-offline');
  function emptyMsg(kind) {
    var p = document.createElement('p');
    p.className = 'col-span-full text-center text-gray-500 py-12 px-4 bg-white rounded-2xl border border-dashed border-emerald-200 text-sm';
    p.textContent = kind === 'academic'
      ? 'No academic or online-class photos yet. Staff: Admin → Gallery → category “Academic / online”.'
      : 'No campus event photos yet. Staff: Admin → Gallery → category “Campus events”.';
    return p;
  }
  function card(g) {
    var div = document.createElement('div');
    div.className = 'gallery-card bg-white rounded-xl shadow overflow-hidden border border-emerald-100 card-lift';
    var img = document.createElement('img');
    img.src = g.imageUrl;
    img.alt = '';
    img.className = 'w-full h-48 object-cover bg-gray-100';
    img.loading = 'lazy';
    var cap = document.createElement('div');
    cap.className = 'p-4';
    var t = document.createElement('p');
    t.className = 'font-bold text-emerald-800 text-center uppercase text-xs tracking-widest';
    t.textContent = g.title || 'Photo';
    cap.appendChild(t);
    div.appendChild(img);
    div.appendChild(cap);
    return div;
  }
  function fillGrid(gridEl, items, kind) {
    gridEl.innerHTML = '';
    if (!items.length) {
      gridEl.appendChild(emptyMsg(kind));
      return;
    }
    items.forEach(function (g) {
      gridEl.appendChild(card(g));
    });
  }
  fetch('/api/gallery', { credentials: 'same-origin' })
    .then(function (r) {
      if (!r.ok) throw new Error('offline');
      return r.json();
    })
    .then(function (items) {
      offline.classList.add('hidden');
      var academic = items.filter(function (g) { return g.category === 'academic'; });
      var events = items.filter(function (g) { return g.category === 'events'; });
      fillGrid(document.getElementById('onlineGrid'), academic, 'academic');
      fillGrid(document.getElementById('eventsGrid'), events, 'events');
      document.dispatchEvent(new Event('ggcc-dom-updated'));
    })
    .catch(function () {
      offline.classList.remove('hidden');
      fillGrid(document.getElementById('onlineGrid'), [], 'academic');
      fillGrid(document.getElementById('eventsGrid'), [], 'events');
    });
})();
</script>
<footer id="footer-placeholder"></footer>
<script src="footer.js"></script>
<script src="assets/animate.js" defer></script>
</body>
</html>
