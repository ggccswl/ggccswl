<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admissions &amp; results lists | GGCC Sahiwal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/theme.css">
</head>
<body class="bg-gray-50 text-gray-800 antialiased">
<div id="nav-root"></div>
<script src="nav.js"></script>

<main class="max-w-5xl mx-auto px-4 py-12">
  <header class="animate-on-scroll mb-8" data-animate>
    <h1 class="text-4xl font-black text-emerald-900">Student lists</h1>
    <p class="mt-3 text-gray-600">Official PDFs for <strong>admissions</strong> and <strong>results</strong> (merit lists, gazettes, etc.). Uploaded by staff in <a href="admin/" class="text-emerald-700 font-semibold underline">Admin</a>.</p>
  </header>

  <div class="flex flex-wrap gap-2 mb-10">
    <button type="button" id="filter-all" class="filter-btn px-5 py-2 rounded-xl font-semibold text-sm bg-emerald-700 text-white">All</button>
    <button type="button" id="filter-admission" class="filter-btn px-5 py-2 rounded-xl font-semibold text-sm bg-white border border-emerald-200 text-emerald-800 hover:bg-emerald-50">Admission</button>
    <button type="button" id="filter-result" class="filter-btn px-5 py-2 rounded-xl font-semibold text-sm bg-white border border-emerald-200 text-emerald-800 hover:bg-emerald-50">Result</button>
  </div>

  <div id="students-offline" class="hidden mb-8 p-4 rounded-2xl bg-amber-50 border border-amber-200 text-amber-900 text-sm">
    Start the site server to load PDF lists. See <code class="bg-amber-100 px-1 rounded">server/README.md</code>.
  </div>

  <div id="students-container" class="space-y-4"></div>
</main>

<div id="pdf-modal" class="hidden fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4">
  <div class="bg-white w-full max-w-5xl h-[90vh] rounded-3xl overflow-hidden relative shadow-2xl">
    <button type="button" id="pdf-modal-close" class="absolute top-4 right-4 bg-red-600 text-white w-10 h-10 rounded-full z-10 font-bold hover:bg-red-700" aria-label="Close">✕</button>
    <iframe id="pdf-modal-frame" title="PDF" src="" class="w-full h-full border-0"></iframe>
  </div>
</div>

<footer id="footer-placeholder"></footer>
<script src="footer.js"></script>
<script src="assets/animate.js" defer></script>
<script>
(function () {
  var container = document.getElementById('students-container');
  var offline = document.getElementById('students-offline');
  var current = '';

  function setActive(btn) {
    document.querySelectorAll('.filter-btn').forEach(function (b) {
      b.classList.remove('bg-emerald-700', 'text-white');
      b.classList.add('bg-white', 'border', 'border-emerald-200', 'text-emerald-800');
    });
    btn.classList.add('bg-emerald-700', 'text-white');
    btn.classList.remove('bg-white', 'border', 'border-emerald-200', 'text-emerald-800');
  }

  function load(cat) {
    current = cat || '';
    var url = '/api/student-lists' + (cat ? '?category=' + encodeURIComponent(cat) : '');
    fetch(url, { credentials: 'same-origin' })
      .then(function (r) {
        if (!r.ok) throw new Error('api');
        return r.json();
      })
      .then(function (list) {
        offline.classList.add('hidden');
        container.innerHTML = '';
        if (!list.length) {
          container.innerHTML = '<p class="text-center text-gray-500 py-12 bg-white rounded-2xl border border-emerald-100">No PDFs in this category yet.</p>';
          return;
        }
        list.forEach(function (l) {
          var row = document.createElement('div');
          row.className = 'bg-white p-6 rounded-2xl shadow-md border-l-8 border-emerald-600 flex flex-col md:flex-row justify-between items-center gap-4 card-lift';
          var badge = l.category === 'admission' ? 'Admission' : 'Result';
          var badgeCls = l.category === 'admission' ? 'bg-blue-100 text-blue-800' : 'bg-emerald-100 text-emerald-800';
          row.innerHTML =
            '<div>' +
            '<span class="text-xs font-bold uppercase tracking-wide px-2 py-1 rounded ' + badgeCls + '">' + badge + '</span>' +
            '<h2 class="text-xl font-bold text-gray-900 mt-2">' + esc(l.title) + '</h2>' +
            '<p class="text-sm text-gray-500">' + esc(l.sessionYear || '') + ' · ' + (l.createdAt || '').slice(0, 10) + '</p>' +
            '</div>' +
            '<div class="flex flex-wrap gap-3">' +
            '<a href="' + l.pdfUrl + '" download class="bg-emerald-700 text-white px-6 py-2 rounded-xl font-bold hover:bg-emerald-800 shadow-md transition">Download</a>' +
            '<button type="button" class="view-pdf border-2 border-emerald-700 text-emerald-700 px-6 py-2 rounded-xl font-bold hover:bg-emerald-50 transition" data-url="' + escAttr(l.pdfUrl) + '">View</button>' +
            '</div>';
          row.querySelector('.view-pdf').addEventListener('click', function () {
            document.getElementById('pdf-modal-frame').src = this.getAttribute('data-url');
            document.getElementById('pdf-modal').classList.remove('hidden');
          });
          container.appendChild(row);
        });
      })
      .catch(function () {
        offline.classList.remove('hidden');
        container.innerHTML = '<p class="text-center text-red-600 py-8">Could not load lists. Is the server running?</p>';
      });
  }

  function esc(s) {
    if (!s) return '';
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }
  function escAttr(s) {
    if (!s) return '';
    return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;');
  }

  document.getElementById('filter-all').addEventListener('click', function () { setActive(this); load(''); });
  document.getElementById('filter-admission').addEventListener('click', function () { setActive(this); load('admission'); });
  document.getElementById('filter-result').addEventListener('click', function () { setActive(this); load('result'); });
  document.getElementById('pdf-modal-close').addEventListener('click', function () {
    document.getElementById('pdf-modal').classList.add('hidden');
    document.getElementById('pdf-modal-frame').src = '';
  });

  var params = new URLSearchParams(location.search);
  var q = params.get('category');
  if (q === 'admission') {
    setActive(document.getElementById('filter-admission'));
    load('admission');
  } else if (q === 'result') {
    setActive(document.getElementById('filter-result'));
    load('result');
  } else {
    load('');
  }
})();
</script>
</body>
</html>
