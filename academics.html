<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academics | GGCC Sahiwal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <main class="max-w-7xl mx-auto py-12 px-4">
        <h2 class="text-4xl font-black text-emerald-800 mb-8">Academic Programs</h2>
        
        <div class="grid md:grid-cols-2 gap-6 mb-12">
            <div class="bg-white p-8 rounded-2xl shadow-md border-t-4 border-emerald-500">
                <h3 class="text-2xl font-bold mb-4">Intermediate Programs</h3>
                <ul class="space-y-2 text-gray-600">
                    <li>• I.Com (Accounting & Commerce)</li>
                    <li>• ICS (Computer Science)</li>
                    <li>• D.Com</li>
                </ul>
            </div>
            <div class="bg-white p-8 rounded-2xl shadow-md border-t-4 border-emerald-500">
                <h3 class="text-2xl font-bold mb-4">Graduate Programs (BS)</h3>
                <ul class="space-y-2 text-gray-600">
                    <li>• BS Commerce (4 Years)</li>
                    <li>• BS Accounting & Finance</li>
                    <li>• ADP (2 Years)</li>
                </ul>
            </div>
        </div>

        <section class="bg-emerald-900 text-white p-10 rounded-3xl shadow-2xl">
            <h3 class="text-3xl font-bold mb-4">College Prospectus 2026</h3>
            <div class="flex flex-col md:flex-row gap-6 items-center">
                <a href="prospectus.pdf" download class="bg-white text-emerald-900 px-8 py-3 rounded-xl font-bold hover:bg-emerald-100">Download PDF</a>
                <button onclick="document.getElementById('pdf-box').classList.toggle('hidden')" class="border-2 border-white px-8 py-3 rounded-xl font-bold">View Online</button>
            </div>
            <div id="pdf-box" class="hidden mt-8 h-[500px] bg-white rounded-xl">
                <iframe src="prospectus.pdf" width="100%" height="100%"></iframe>
            </div>
        </section>
    </main>
</body>
</html>
