<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events Gallery | GGCC Sahiwal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
    <body class="bg-gray-50 text-gray-800">
    <header class="sticky top-0 z-50 shadow-lg bg-white/95 backdrop-blur-sm py-4 px-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-extrabold text-emerald-700">GGCC Sahiwal</h1>
            <nav class="hidden md:flex space-x-6 text-sm font-medium">
                <a href="index.html" class="text-emerald-600 font-bold">Home</a>
                <a href="academics.html" class="text-gray-600 hover:text-emerald-600">Academics</a>
                <a href="conduct.html" class="text-gray-600 hover:text-emerald-600">Rules</a>
                <a href="online-classes.html" class="text-gray-600 hover:text-emerald-600">Online Classes</a>
                <a href="events.html" class="text-gray-600 hover:text-emerald-600">Events</a>
            </nav>
        </div>
    </header>
<body class="bg-gray-50">
    <main class="max-w-7xl mx-auto py-12 px-4">
        <h2 class="text-4xl font-black text-center mb-8 text-emerald-800">Campus Events</h2>

        <div class="max-w-md mx-auto mb-10">
            <input type="text" id="gallerySearch" onkeyup="filterGallery()" placeholder="Search sports, exams, etc..." class="w-full p-4 rounded-2xl border-2 border-emerald-200 shadow-sm focus:ring-2 focus:ring-emerald-500 outline-none">
        </div>

        <details class="mb-12 bg-gray-800 text-white p-6 rounded-2xl shadow-xl">
            <summary class="cursor-pointer font-bold">ADMIN: Generate GitHub Gallery Code</summary>
            <div class="grid md:grid-cols-2 gap-4 mt-4">
                <input type="text" id="adminTitle" placeholder="Event Name" class="text-black p-2 rounded">
                <input type="text" id="adminUrl" placeholder="Image Path (e.g. uploads/pic.jpg)" class="text-black p-2 rounded">
            </div>
            <button onclick="generateCode()" class="mt-4 bg-emerald-600 px-6 py-2 rounded font-bold">Get Code</button>
            <textarea id="codeResult" class="w-full mt-4 h-24 bg-black text-green-400 p-2 text-xs" readonly></textarea>
        </details>

        <div id="eventsGallery" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="group bg-white rounded-2xl shadow-md overflow-hidden transition-all">
                <img src="https://via.placeholder.com/600x400" class="w-full h-60 object-cover">
                <div class="p-5"><h4 class="font-bold text-xl">Annual Sports Day</h4></div>
            </div>
        </div>
    </main>

    <script>
        function filterGallery() {
            const filter = document.getElementById('gallerySearch').value.toLowerCase();
            const cards = document.getElementById('eventsGallery').getElementsByClassName('group');
            for (let card of cards) {
                const title = card.querySelector('h4').innerText.toLowerCase();
                card.style.display = title.includes(filter) ? "" : "none";
            }
        }

        function generateCode() {
            const t = document.getElementById('adminTitle').value;
            const u = document.getElementById('adminUrl').value;
            const code = `<div class="group bg-white rounded-2xl shadow-md overflow-hidden transition-all"><img src="${u}" class="w-full h-60 object-cover"><div class="p-5"><h4 class="font-bold text-xl">${t}</h4></div></div>`;
            document.getElementById('codeResult').value = code;
        }
    </script>
    <script src="footer.js"></script>
</body>
</html>
