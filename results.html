<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Results | GGCC Sahiwal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">

    <main class="max-w-5xl mx-auto py-12 px-4">
        <div class="text-center mb-12">
            <h2 class="text-4xl font-black text-emerald-800 uppercase tracking-tighter">Examination Results</h2>
            <p class="text-gray-500 mt-2 italic text-sm">Official Gazette & Position Holders - Session 2025-2026</p>
        </div>

        <div class="mb-10 max-w-md mx-auto">
            <input type="text" id="resultSearch" onkeyup="filterResults()" placeholder="Search class (e.g. I.Com, BS, ADP)..." class="w-full p-4 rounded-2xl border-2 border-emerald-100 shadow-sm focus:ring-2 focus:ring-emerald-500 outline-none transition-all">
        </div>

        <div id="resultsContainer" class="space-y-4">
            
            <div class="result-card bg-white p-6 rounded-2xl shadow-md border-l-8 border-emerald-600 flex flex-col md:flex-row justify-between items-center hover:shadow-lg transition">
                <div class="mb-4 md:mb-0">
                    <h4 class="text-xl font-bold text-gray-900">I.Com Part-II (Annual 2025)</h4>
                    <p class="text-sm text-gray-500 uppercase tracking-widest font-semibold">BISE Sahiwal Board</p>
                </div>
                <div class="flex space-x-3">
                    <a href="uploads/results/icom-2025.pdf" download class="bg-emerald-700 text-white px-6 py-2 rounded-xl font-bold hover:bg-emerald-800 shadow-md">Download PDF</a>
                    <button onclick="viewResult('uploads/results/icom-2025.pdf')" class="border-2 border-emerald-700 text-emerald-700 px-6 py-2 rounded-xl font-bold hover:bg-emerald-50">View Online</button>
                </div>
            </div>

            <div class="result-card bg-white p-6 rounded-2xl shadow-md border-l-8 border-blue-600 flex flex-col md:flex-row justify-between items-center hover:shadow-lg transition">
                <div class="mb-4 md:mb-0">
                    <h4 class="text-xl font-bold text-gray-900">BS Commerce Semester 4</h4>
                    <p class="text-sm text-gray-500 uppercase tracking-widest font-semibold">GCUF Affiliated</p>
                </div>
                <div class="flex space-x-3">
                    <a href="uploads/results/bs-sem4.pdf" download class="bg-blue-700 text-white px-6 py-2 rounded-xl font-bold hover:bg-blue-800 shadow-md">Download PDF</a>
                    <button onclick="viewResult('uploads/results/bs-sem4.pdf')" class="border-2 border-blue-700 text-blue-700 px-6 py-2 rounded-xl font-bold hover:bg-blue-50">View Online</button>
                </div>
            </div>

        </div>

        <div id="resultModal" class="hidden fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4">
            <div class="bg-white w-full max-w-5xl h-[90vh] rounded-3xl overflow-hidden relative">
                <button onclick="closeModal()" class="absolute top-4 right-4 bg-red-600 text-white p-2 rounded-full z-10">✕</button>
                <iframe id="pdfViewer" src="" width="100%" height="100%"></iframe>
            </div>
        </div>
    </main>

    <script src="footer.js"></script>

    <script>
        function filterResults() {
            const input = document.getElementById('resultSearch').value.toLowerCase();
            const cards = document.getElementsByClassName('result-card');
            for (let card of cards) {
                const title = card.querySelector('h4').innerText.toLowerCase();
                card.style.display = title.includes(input) ? "flex" : "none";
            }
        }

        function viewResult(pdfPath) {
            document.getElementById('pdfViewer').src = pdfPath;
            document.getElementById('resultModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('resultModal').classList.add('hidden');
            document.getElementById('pdfViewer').src = "";
        }
    </script>
</body>
</html>
