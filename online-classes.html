<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Gallery | GGCC Sahiwal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap'); body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50">
    <header class="sticky top-0 z-50 shadow-lg bg-white/95 py-4 px-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-extrabold text-emerald-700">GGCC Sahiwal</h1>
            <nav class="space-x-6 text-sm font-medium">
                <a href="index.html" class="text-gray-600">Home</a>
                <a href="academics.html" class="text-gray-600">Academics</a>
                <a href="conduct.html" class="text-gray-600">Rules & Facilities</a>
                <a href="online-classes.html" class="text-emerald-600 font-bold">Media Gallery</a>
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto py-12 px-4">
        
        <section class="max-w-4xl mx-auto bg-white p-8 rounded-2xl shadow-xl mb-16 border-t-8 border-emerald-600">
            <h3 class="text-2xl font-bold text-gray-800 mb-6">Upload Center</h3>
            <div class="grid md:grid-cols-2 gap-6">
                <div class="space-y-4">
                    <label class="block text-sm font-medium text-gray-700">Event/Class Title</label>
                    <input type="text" id="imgTitle" placeholder="e.g. Annual Sports Day 2026" class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none">
                    
                    <label class="block text-sm font-medium text-gray-700">Category</label>
                    <select id="imgCategory" class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none">
                        <option value="online">Online Classes</option>
                        <option value="events">College Events</option>
                    </select>
                </div>
                <div class="flex flex-col justify-end space-y-4">
                    <input type="file" id="imgFile" accept="image/*" class="text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100 cursor-pointer">
                    <button onclick="addPhoto()" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-xl hover:bg-emerald-700 shadow-lg transition">Post to Gallery</button>
                </div>
            </div>
        </section>

        <div class="mb-20">
            <div class="flex items-center space-x-4 mb-8">
                <h2 class="text-3xl font-black text-gray-800">Academic: Online Classes</h2>
                <div class="flex-grow h-1 bg-emerald-200 rounded"></div>
            </div>
            <div id="onlineGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                <div class="bg-white rounded-xl shadow overflow-hidden border">
                    <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=600&q=80" class="w-full h-48 object-cover">
                    <div class="p-4"><p class="font-bold text-emerald-800 text-center uppercase text-sm tracking-widest">IT Workshop Session</p></div>
                </div>
            </div>
        </div>

        <div>
            <div class="flex items-center space-x-4 mb-8">
                <h2 class="text-3xl font-black text-gray-800">Campus Events & Life</h2>
                <div class="flex-grow h-1 bg-emerald-200 rounded"></div>
            </div>
            <div id="eventsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                <div class="bg-white rounded-xl shadow overflow-hidden border">
                    <img src="https://images.unsplash.com/photo-1523580494863-6f3031224c94?auto=format&fit=crop&w=600&q=80" class="w-full h-48 object-cover">
                    <div class="p-4"><p class="font-bold text-emerald-800 text-center uppercase text-sm tracking-widest">Annual Convocation</p></div>
                </div>
            </div>
        </div>

    </main>

    <script>
        function addPhoto() {
            const title = document.getElementById('imgTitle').value;
            const category = document.getElementById('imgCategory').value;
            const fileInput = document.getElementById('imgFile');
            
            // Determine which grid to send the photo to
            const targetGrid = category === 'online' ? document.getElementById('onlineGrid') : document.getElementById('eventsGrid');

            if (title === "" || fileInput.files.length === 0) {
                alert("Please fill in the title and select an image!");
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const newDiv = document.createElement('div');
                newDiv.className = "bg-white rounded-xl shadow-lg overflow-hidden border-2 border-emerald-50 hover:border-emerald-500 transition-all duration-300";
                newDiv.innerHTML = `
                    <img src="${e.target.result}" class="w-full h-48 object-cover">
                    <div class="p-4">
                        <p class="font-bold text-emerald-800 text-center uppercase text-xs tracking-widest">${title}</p>
                    </div>
                `;
                targetGrid.prepend(newDiv);
                
                // Reset inputs
                document.getElementById('imgTitle').value = "";
                document.getElementById('imgFile').value = "";
            };
            reader.readAsDataURL(fileInput.files[0]);
        }
    </script>

    <footer class="bg-gray-800 text-white py-8 text-center mt-20">
        <p class="text-sm">&copy; 2026 GGCC Sahiwal Media Portal</p>
    </footer>
</body>
</html>
